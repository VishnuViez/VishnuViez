name: Generate Contribution Snake

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: Platane/snk/svg-only@v3
        with:
          github_user_name: VishnuViez
          outputs: |
            dist/github-snake.svg?palette=github-light&color_snake=%2316a34a&color_dots=%23f8fafc,%23dcfce7,%2386efac,%2322c55e,%23166534
            dist/github-snake-dark.svg?palette=github-dark&color_snake=%2300ff7f&color_dots=%23182725,%23065f46,%23059669,%2310b981,%23bbf7d0

      - uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
