name: Generate Contribution Snake

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: Platane/snk/svg-only@v3
        with:
          github_user_name: VishnuViez
          outputs: |
            dist/github-snake.svg?palette=github-light&color_snake=%23ffffff&color_dots=%23ffffff,%23f8fafc,%23f1f5f9,%23e2e8f0,%23cbd5e1
            dist/github-snake-dark.svg?palette=github-dark&color_snake=%23ffffff&color_dots=%23ffffff,%23f8fafc,%23e2e8f0,%23cbd5e1,%2394a3b8
            
      - uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
