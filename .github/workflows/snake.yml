name: Generate Contribution Snake

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: Platane/snk/svg-only@v3
        with:
          github_user_name: VishnuViez
          outputs: |
            dist/github-snake.svg?palette=github-light&color_snake=16a34a&color_dots=#f8fafc,#dcfce7,#86efac,#22c55e,#166534
            dist/github-snake-dark.svg?palette=github-dark&color_snake=22c55e&color_dots=#0d1117,#052e16,#166534,#22c55e,#bbf7d0

      - uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
